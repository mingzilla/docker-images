services:
  ollama:
    image: ollama/ollama:0.11.5 # DO NOT upgrade, this version uses 100% GPU
    container_name: ollama-qwen2pt5_32b
    ports:
      - "30205:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s